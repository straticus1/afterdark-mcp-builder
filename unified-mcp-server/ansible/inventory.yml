all:
  hosts:
    mcp_server:
      ansible_host: "{{ lookup('env', 'MCP_SERVER_IP') }}"
      ansible_user: ec2-user
      ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_KEY_PATH') | default('~/.ssh/mcp-server-key.pem', true) }}"
      ansible_python_interpreter: /usr/bin/python3

  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
