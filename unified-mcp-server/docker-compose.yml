version: '3.8'

services:
  unified-mcp-server:
    build: .
    image: unified-mcp-server:latest
    container_name: unified-mcp-server
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - API_KEY=${API_KEY:-}
      - MODULES=${MODULES:-filesystem,memory,terminal,oci,cloudflare,neon,github,docker,twilio}
      - ENABLE_HTTPS=${ENABLE_HTTPS:-false}
      - DEBUG=${DEBUG:-0}
      # OCI (Oracle Cloud Infrastructure)
      - OCI_TENANCY_ID=${OCI_TENANCY_ID:-}
      - OCI_REGION=${OCI_REGION:-us-ashburn-1}
      # Cloudflare
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-}
      # Neon (Serverless Postgres)
      - NEON_API_KEY=${NEON_API_KEY:-}
      # GitHub
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Twilio
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
    volumes:
      # Mount workspace for filesystem access (optional)
      - ${WORKSPACE_PATH:-./workspace}:/workspace:rw
      # Mount SSL certificates (optional, for HTTPS)
      - ${CERT_PATH:-./certs}:/certs:ro
      # Mount Docker socket for Docker module
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Nginx reverse proxy for HTTPS termination
  nginx:
    image: nginx:alpine
    container_name: unified-mcp-nginx
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${CERT_PATH:-./certs}:/etc/nginx/certs:ro
    depends_on:
      - unified-mcp-server
    networks:
      - mcp-network
    restart: unless-stopped
    profiles:
      - with-nginx

networks:
  mcp-network:
    driver: bridge
